<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Pulse — Piilosana</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08040c;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.container{text-align:center;max-width:500px;width:100%}
h1{color:#ff44aa;font-size:28px;margin-bottom:4px;letter-spacing:4px}
.sub{color:#884466;font-size:14px;margin-bottom:6px}
.style{color:#aa3388;font-size:12px;margin-bottom:32px;font-style:italic}
.play-btn{
  width:120px;height:120px;border-radius:50%;border:3px solid #ff44aa44;
  background:radial-gradient(circle at 40% 35%,#1a0a14,#100610);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;margin:0 auto 24px;
  box-shadow:0 0 40px #ff44aa0a,inset 0 0 30px #ffffff05;
}
.play-btn:hover{border-color:#ff44aa;box-shadow:0 0 60px #ff44aa1a;transform:scale(1.05)}
.play-btn.playing{border-color:#ff44aa;box-shadow:0 0 80px #ff44aa33;animation:pulse 2s ease-in-out infinite}
.play-btn svg{width:40px;height:40px;fill:#ff44aaaa;transition:fill 0.3s}
.play-btn.playing svg{fill:#ff44aa}
.info{color:#443344;font-size:12px;margin-top:8px}
.visualizer{height:70px;display:flex;align-items:flex-end;justify-content:center;gap:2px;margin-bottom:24px;opacity:0;transition:opacity 0.5s}
.visualizer.active{opacity:1}
.bar{width:3px;border-radius:2px;height:3px}
@keyframes pulse{0%,100%{box-shadow:0 0 40px #ff44aa15}50%{box-shadow:0 0 100px #ff44aa44}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.container{animation:fadeIn 0.8s ease}
</style>
</head><body>
<div class="container">
  <h1>NEON PULSE</h1>
  <div class="sub">neonin syke</div>
  <div class="style">Giorgio Moroder italo-disco · sequencer & synth · 120 bpm</div>

  <div class="visualizer" id="viz"></div>

  <button class="play-btn" id="playBtn" onclick="togglePlay()">
    <svg id="playIcon" viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>
  </button>

  <div class="info">Klikkaa kuunnellaksesi</div>
</div>

<script>
const vizEl=document.getElementById('viz');
for(let i=0;i<28;i++){const b=document.createElement('div');b.className='bar';vizEl.appendChild(b);}
const bars=document.querySelectorAll('.bar');
let playing=false,parts=null,vizFrame=null;

function animateViz(){
  if(!playing)return;
  const t=Date.now();
  bars.forEach((b,i)=>{
    const kick=Math.abs(Math.sin(t/250))*15;
    const h=3+kick+Math.abs(Math.sin(t/400+i*0.6))*30+Math.random()*8;
    b.style.height=h+'px';
    const hue=310+Math.sin(t/1000+i*0.3)*30;
    b.style.background=`hsl(${hue},80%,${40+Math.sin(t/600+i*0.5)*15}%)`;
  });
  vizFrame=requestAnimationFrame(animateViz);
}

async function togglePlay(){
  if(playing){stopPlay();return;}
  await Tone.start();playing=true;
  document.getElementById('playBtn').classList.add('playing');
  document.getElementById('playIcon').innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  vizEl.classList.add('active');animateViz();startMoroder();
}
function stopPlay(){
  playing=false;if(vizFrame)cancelAnimationFrame(vizFrame);
  document.getElementById('playBtn').classList.remove('playing');
  document.getElementById('playIcon').innerHTML='<polygon points="8,5 19,12 8,19"/>';
  vizEl.classList.remove('active');bars.forEach(b=>{b.style.height='3px'});
  if(parts){try{Tone.Transport.stop();Tone.Transport.cancel();}catch{}
  Object.values(parts).forEach(p=>{try{if(p.stop)p.stop();if(p.dispose)p.dispose();}catch{}});parts=null;}
}

function startMoroder(){
  Tone.Transport.bpm.value=120;

  // === EFFECTS ===
  const rev=new Tone.Reverb({decay:2.5,wet:0.2}).toDestination();
  const del=new Tone.FeedbackDelay({delayTime:"8n",feedback:0.2,wet:0.15}).connect(rev);

  // === SEQUENCER BASS — the Moroder signature ===
  const seqFilter=new Tone.Filter({frequency:800,type:"lowpass",rolloff:-24,Q:4}).connect(rev);
  const seqSynth=new Tone.Synth({
    oscillator:{type:"sawtooth"},
    envelope:{attack:0.005,decay:0.12,sustain:0.08,release:0.1},
    volume:-10
  }).connect(seqFilter);

  // Manual filter sweep instead of LFO (more compatible)
  let filterPhase=0;

  // === LEAD SYNTH — soaring, analog-style ===
  const leadFilter=new Tone.Filter({frequency:3000,type:"lowpass",rolloff:-12}).connect(del);
  const lead=new Tone.Synth({
    oscillator:{type:"sawtooth"},
    envelope:{attack:0.08,decay:0.5,sustain:0.5,release:1.2},
    volume:-15
  }).connect(leadFilter);

  // Lead second voice — square wave
  const lead2Filter=new Tone.Filter({frequency:2500,type:"lowpass",rolloff:-12}).connect(del);
  const lead2=new Tone.Synth({
    oscillator:{type:"square"},
    envelope:{attack:0.1,decay:0.4,sustain:0.4,release:1.0},
    volume:-22
  }).connect(lead2Filter);

  // === PADS — lush, wide ===
  const padF=new Tone.Filter({frequency:1500,type:"lowpass",rolloff:-12}).connect(rev);
  const pad=new Tone.PolySynth(Tone.Synth,{
    oscillator:{type:"sawtooth"},
    envelope:{attack:1.0,decay:1.5,sustain:0.5,release:2.5},
    volume:-24
  }).connect(padF);

  // === STRING STABS — disco-style rhythmic chords ===
  const stabF=new Tone.Filter({frequency:2800,type:"lowpass",rolloff:-12}).connect(rev);
  const stab=new Tone.PolySynth(Tone.Synth,{
    oscillator:{type:"sawtooth"},
    envelope:{attack:0.01,decay:0.2,sustain:0.1,release:0.3},
    volume:-18
  }).connect(stabF);

  // === DRUMS ===
  const kick=new Tone.MembraneSynth({
    volume:-8,pitchDecay:0.05,octaves:5,
    envelope:{attack:0.005,decay:0.3,sustain:0,release:0.2}
  }).toDestination();

  const snare=new Tone.NoiseSynth({
    noise:{type:"white"},
    envelope:{attack:0.002,decay:0.15,sustain:0,release:0.1},
    volume:-14
  }).toDestination();

  const hihat=new Tone.NoiseSynth({
    noise:{type:"white"},
    envelope:{attack:0.001,decay:0.03,sustain:0,release:0.02},
    volume:-20
  }).toDestination();

  const openHat=new Tone.NoiseSynth({
    noise:{type:"white"},
    envelope:{attack:0.001,decay:0.2,sustain:0.05,release:0.15},
    volume:-22
  }).toDestination();

  const clap=new Tone.NoiseSynth({
    noise:{type:"pink"},
    envelope:{attack:0.001,decay:0.1,sustain:0,release:0.08},
    volume:-16
  }).connect(rev);

  // ============================================================
  // COMPOSITION — Am — F — C — G (driving italo-disco)
  // ============================================================

  const seqPatterns=[
    ["A1","A1","A2","A1","A1","A2","A1","A2","A1","A1","A2","A1","E2","A1","A2","A1"],
    ["F1","F1","F2","F1","F1","F2","F1","F2","F1","F1","F2","F1","C2","F1","F2","F1"],
    ["C2","C2","C3","C2","C2","C3","C2","C3","C2","C2","C3","C2","G2","C2","C3","C2"],
    ["G1","G1","G2","G1","G1","G2","G1","G2","G1","G1","G2","G1","D2","G1","G2","G1"],
    ["A1","A1","A2","A1","E2","A1","A2","E2","A1","A1","A2","A1","E2","A2","E2","A1"],
    ["D1","D1","D2","D1","D1","D2","D1","D2","D1","D1","D2","D1","A1","D1","D2","D1"],
    ["F1","F1","F2","F1","C2","F1","F2","C2","F1","F1","F2","F1","C2","F2","C2","F1"],
    ["E1","E1","E2","E1","E1","E2","E1","E2","E1","E1","E2","E1","B1","E1","E2","E1"],
  ];

  const padChords=[
    ["A3","C4","E4"],["F3","A3","C4"],["C3","E3","G3"],["G3","B3","D4"],
    ["A3","C4","E4"],["D3","F3","A3"],["F3","A3","C4"],["E3","G#3","B3"],
  ];

  const stabChords=[
    ["A4","C5","E5"],["F4","A4","C5"],["C4","E4","G4"],["G4","B4","D5"],
    ["A4","C5","E5"],["D4","F4","A4"],["F4","A4","C5"],["E4","G#4","B4"],
  ];

  const leadA=[
    "E5",null,null,"A5",null,"G5",null,"E5",
    null,"C5",null,"D5","E5",null,null,null,
    "G5",null,null,"E5",null,"D5",null,"C5",
    null,"B4",null,"C5","D5",null,null,null,
  ];
  const leadB=[
    "A5",null,null,"C6",null,"B5",null,"A5",
    null,"G5",null,"A5","B5",null,null,null,
    "C6",null,"B5","A5",null,"G5",null,"E5",
    null,"D5",null,"E5",null,null,null,null,
  ];

  let seqStep=0,seqChord=0,pc=0,ls=0,beat=0;
  let useB=false;

  // Sequencer bass — 16th notes + manual filter sweep
  const seqLoop=new Tone.Loop(t=>{
    const ci=seqChord%8;
    const note=seqPatterns[ci][seqStep%16];
    seqSynth.triggerAttackRelease(note,"32n",t);
    // Sweep filter manually
    filterPhase+=0.015;
    const freq=800+Math.sin(filterPhase)*600;
    seqFilter.frequency.setValueAtTime(freq,t);
    seqStep++;
    if(seqStep%16===0)seqChord++;
  },"16n");

  // Pad
  const padLoop=new Tone.Loop(t=>{
    pad.triggerAttackRelease(padChords[pc%8],"1m",t);pc++;
  },"1m");

  // String stabs — offbeat disco hits
  let stabBeat=0,stabChord=0;
  const stabLoop=new Tone.Loop(t=>{
    const pos=stabBeat%8;
    if(pos===1||pos===5){
      stab.triggerAttackRelease(stabChords[stabChord%8],"16n",t);
    }
    stabBeat++;
    if(stabBeat%8===0)stabChord++;
  },"8n");

  // Lead melody
  const leadLoop=new Tone.Loop(t=>{
    const mel=useB?leadB:leadA;
    const note=mel[ls%32];
    if(note){
      lead.triggerAttackRelease(note,"4n",t);
      lead2.triggerAttackRelease(note,"4n",t);
    }
    ls++;
    if(ls%32===0)useB=!useB;
  },"4n");

  // Four-on-the-floor drums
  const drumLoop=new Tone.Loop(t=>{
    const p=beat%16;
    // Kick every quarter
    if(p%4===0)kick.triggerAttackRelease("C1","8n",t);
    // Snare + clap on 2 and 4
    if(p===4||p===12){snare.triggerAttackRelease("16n",t);clap.triggerAttackRelease("16n",t);}
    // Closed hihat on 8ths
    if(p%2===0)hihat.triggerAttackRelease("32n",t);
    // Open hihat on upbeats
    if(p%4===2)openHat.triggerAttackRelease("16n",t);
    beat++;
  },"16n");

  // === Build — iconic Moroder intro ===
  seqLoop.start(0);           // Sequencer bass alone
  drumLoop.start("4m");       // Kick enters
  padLoop.start("8m");        // Pads
  stabLoop.start("8m");       // Stabs
  leadLoop.start("16m");      // Lead soars in

  Tone.Transport.start();
  parts={seqSynth,seqFilter,lead,leadFilter,lead2,lead2Filter,
    pad,padF,stab,stabF,kick,snare,hihat,openHat,clap,
    rev,del,seqLoop,padLoop,stabLoop,leadLoop,drumLoop};
}
</script>
</body></html>
